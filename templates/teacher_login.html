<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login - गायत्री विद्यापीठ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif; }
        .hindi { font-family: 'Noto Sans Devanagari', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .green-grad { background: linear-gradient(135deg, #10B981 0%, #047857 100%); }
        .input-field { transition: all 0.3s ease; border: 2px solid #f3f4f6; }
        .input-field:focus { border-color: #10B981; box-shadow: 0 0 0 4px rgba(16,185,129,0.1); outline: none; transform: translateY(-1px); }
        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8 relative" style="background-image: url('https://i.etsystatic.com/10949726/r/il/e9d23a/2122553551/il_1588xN.2122553551_kcqd.jpg'); background-size: cover; background-position: center; background-attachment: fixed;">
<div class="absolute inset-0 bg-black/40 z-0 pointer-events-none"></div>

<div class="w-full max-w-4xl glass-panel relative z-10 rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
    
    <!-- Left Section: Branding & Maa Gayatri -->
    <div class="w-full md:w-5/12 p-8 sm:p-12 flex flex-col items-center justify-center text-center relative overflow-hidden bg-gradient-to-b from-white/20 to-white/5 border-b md:border-b-0 md:border-r border-white/20">
        <!-- Abstract background elements -->
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-yellow-300 rounded-full mix-blend-multiply filter blur-2xl opacity-40 animate-pulse"></div>
            <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-green-300 rounded-full mix-blend-multiply filter blur-2xl opacity-40 animate-pulse" style="animation-delay: 2s;"></div>
        </div>

        <a href="https://awgp.org" target="_blank" title="Maa Gayatri - AWGP" class="transform hover:scale-105 transition duration-500 relative z-10 block mb-6">
            <img src="https://gurukulam.awgp.in/var/profiles/3044/post/15715/Guruji-Mataji-11.jpg" 
                 alt="Guruji Mataji" 
                 class="w-40 h-40 sm:w-48 sm:h-48 md:w-56 md:h-56 object-cover rounded-full border-4 border-yellow-300 shadow-2xl mx-auto ring-4 ring-white/30">
        </a>
        <h1 class="hindi text-3xl sm:text-4xl font-extrabold text-white drop-shadow-md relative z-10 tracking-wide">गायत्री विद्यापीठ</h1>
        <p class="text-green-50 font-medium tracking-widest mt-2 relative z-10 text-sm uppercase">शिक्षक पोर्टल - दाउदनगर</p>
    </div>

    <!-- Left Section: Login Form -->
    <div class="w-full md:w-7/12 p-8 sm:p-12 bg-white/95">
        <div class="mb-8 flex flex-col items-center text-center">
            <div class="w-28 h-28 sm:w-36 sm:h-36 bg-white p-2 rounded-2xl shadow-xl border-4 border-green-100 shrink-0 mb-4 mx-auto">
                <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo" class="w-full h-full object-cover rounded-xl">
            </div>
            <div class="flex flex-col">
                <h2 class="text-2xl sm:text-3xl font-extrabold text-gray-800 hindi leading-tight">शिक्षक Login</h2>
                <span class="text-gray-500 text-xs sm:text-sm font-medium mt-1 hindi">Teacher ID और Password से login करें</span>
            </div>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for msg in messages %}
        <div class="bg-red-50 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded-r shadow-sm mb-6 text-sm hindi flex items-center">
            <i class="fas fa-exclamation-circle mr-2 text-red-500"></i>{{ msg }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">
                    <i class="fas fa-id-badge text-green-500 mr-2"></i> Teacher ID
                </label>
                <input type="text" name="teacher_id" required placeholder="जैसे: TCH001"
                    class="input-field w-full px-5 py-3.5 rounded-xl bg-gray-50 text-gray-800 hindi placeholder-gray-400 uppercase">
            </div>
            <div class="relative">
                <label class="block text-sm font-bold text-gray-700 mb-2">
                    <i class="fas fa-lock text-green-500 mr-2"></i> Password
                </label>
                <div class="relative">
                    <input type="password" name="password" id="password" required placeholder="••••••••"
                        class="input-field w-full px-5 py-3.5 rounded-xl bg-gray-50 text-gray-800 pr-12 focus:outline-none">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-green-500 transition">
                        <i id="password-eye" class="fas fa-eye text-xl"></i>
                    </button>
                </div>
            </div>
            <button type="submit"
                class="w-full green-grad btn-hover text-white font-bold text-lg py-4 rounded-xl flex items-center justify-center gap-2 mt-6">
                <i class="fas fa-sign-in-alt"></i>
                <span class="hindi">Login करें</span>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center flex flex-col items-center space-y-3">
            <a href="{{ url_for('teacher_forgot_password') }}" class="text-sm font-semibold text-emerald-600 hover:text-emerald-700 transition hindi">
                पासवर्ड भूल गए?
            </a>
            <a href="{{ url_for('admin_login') }}" class="text-sm font-bold text-green-600 hover:text-green-700 transition flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-green-50 hindi">
                <i class="fas fa-user-shield"></i> Admin Login पर जाएं
            </a>
            <a href="{{ url_for('index') }}" class="text-sm font-bold text-gray-500 hover:text-gray-700 transition flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-gray-50 hindi mt-2">
                <i class="fas fa-home"></i> Home पर वापस जाएं
            </a>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('password-eye');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
        }
    }
</script>

</body>
</html>
