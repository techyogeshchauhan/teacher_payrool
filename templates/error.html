{% extends "base.html" %}
{% block title %}{{ error }} - गायत्री विद्यापीठ{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-10 px-4">
    <div class="max-w-lg w-full text-center bg-white/90 backdrop-blur-md rounded-3xl p-10 card-shadow border border-orange-100">
        <div class="mb-6">
            <div class="w-24 h-24 mx-auto bg-gradient-to-br from-orange-100 to-orange-50 rounded-full flex items-center justify-center shadow-inner">
                {% if '403' in error|string %}
                <i class="fas fa-shield-alt text-4xl text-red-500"></i>
                {% elif '404' in error|string %}
                <i class="fas fa-search text-4xl text-orange-500"></i>
                {% else %}
                <i class="fas fa-exclamation-triangle text-4xl text-yellow-500"></i>
                {% endif %}
            </div>
        </div>
        <h1 class="text-3xl font-extrabold text-gray-800 hindi mb-2">{{ error }}</h1>
        <p class="text-gray-500 font-medium hindi mb-8">{{ message }}</p>
        <a href="{{ url_for('index') }}" 
           class="inline-block saffron-grad text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-orange-500/30 hover:shadow-orange-500/50 hover:-translate-y-0.5 transition-all duration-200">
            <i class="fas fa-home mr-2"></i>मुख्य पेज पर जाएं
        </a>
    </div>
</div>
{% endblock %}
