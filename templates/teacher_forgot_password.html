<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - गायत्री विद्यापीठ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif; }
        .hindi { font-family: 'Noto Sans Devanagari', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .green-grad { background: linear-gradient(135deg, #10B981 0%, #047857 100%); }
        .input-field { transition: all 0.3s ease; border: 2px solid #f3f4f6; }
        .input-field:focus { border-color: #10B981; box-shadow: 0 0 0 4px rgba(16,185,129,0.1); outline: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-green-400 via-emerald-500 to-teal-700 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md glass-panel rounded-3xl shadow-xl overflow-hidden bg-white/95 p-8">
    <div class="text-center mb-6">
        <div class="w-16 h-16 bg-green-100 rounded-full mx-auto flex items-center justify-center text-green-600 shadow-sm mb-4">
            <i class="fas fa-question-circle text-3xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 hindi">पासवर्ड भूल गए?</h2>
        <p class="text-gray-500 text-sm mt-1 hindi">अपना Teacher ID और पंजीकृत मोबाइल नंबर दर्ज करें</p>
    </div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for msg in messages %}
    <div class="bg-red-50 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded text-sm hindi mb-4">
        {{ msg }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1 hindi">Teacher ID</label>
            <input type="text" name="teacher_id" required placeholder="जैसे: TCH001"
                class="input-field w-full px-4 py-3 rounded-xl bg-gray-50 text-gray-800 uppercase">
        </div>
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1 hindi">Phone Number</label>
            <input type="text" name="phone" required placeholder="10 अंक का मोबाइल नंबर"
                class="input-field w-full px-4 py-3 rounded-xl bg-gray-50 text-gray-800">
        </div>
        <button type="submit" class="w-full green-grad text-white font-bold py-3 rounded-xl hover:opacity-90 transition mt-2 hindi">
            Verify & Reset
        </button>
    </form>
    
    <div class="mt-6 text-center">
        <a href="{{ url_for('teacher_login') }}" class="text-sm font-bold text-green-600 hover:underline hindi">
            <i class="fas fa-arrow-left"></i> वापस Login पर जाएं
        </a>
    </div>
</div>

</body>
</html>
