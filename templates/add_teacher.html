{% extends "base.html" %}
{% block title %}Teacher जोड़ें - गायत्री विद्यापीठ{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="{{ url_for('manage_teachers') }}" class="text-gray-400 hover:text-orange-600 transition">
            <i class="fas fa-arrow-left text-xl"></i>
        </a>
        <h1 class="text-2xl font-bold text-gray-800 hindi flex items-center gap-2">
            <i class="fas fa-user-plus text-orange-500"></i> नया Teacher जोड़ें
        </h1>
    </div>

    <div class="bg-white rounded-2xl card-shadow overflow-hidden">
        <div class="saffron-grad px-6 py-4">
            <p class="text-white text-sm hindi">सभी जानकारी सही से भरें</p>
        </div>

        <form method="POST" class="p-6 space-y-5">
            <div class="grid md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 hindi">
                        <i class="fas fa-user text-orange-500 mr-1"></i> पूरा नाम *
                    </label>
                    <input type="text" name="name" id="name_input" required placeholder="शिक्षक का नाम"
                        class="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-orange-400 focus:outline-none bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 hindi">
                        <i class="fas fa-phone text-orange-500 mr-1"></i> फ़ोन नंबर *
                    </label>
                    <input type="text" name="phone" id="phone_input" required placeholder="10 अंक का नंबर" maxlength="10" minlength="10"
                        class="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-orange-400 focus:outline-none bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 hindi">
                        <i class="fas fa-book text-orange-500 mr-1"></i> विषय *
                    </label>
                    <input type="text" name="subject" required placeholder="जैसे: गणित, विज्ञान"
                        class="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-orange-400 focus:outline-none bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">
                        <i class="fas fa-envelope text-orange-500 mr-1"></i> Email (optional)
                    </label>
                    <input type="email" name="email" placeholder="email@example.com"
                        class="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-orange-400 focus:outline-none bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 hindi">
                        <i class="fas fa-calendar text-orange-500 mr-1"></i> Joining Date *
                    </label>
                    <input type="date" name="joining_date" required
                        class="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-orange-400 focus:outline-none bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 hindi">
                        <i class="fas fa-rupee-sign text-orange-500 mr-1"></i> Basic Salary (₹/माह) *
                    </label>
                    <input type="number" name="basic_salary" required placeholder="जैसे: 15000" min="1000"
                        class="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-orange-400 focus:outline-none bg-gray-50">
                </div>
            </div>

            <div class="pt-4 border-t border-gray-100">
                <h3 class="text-sm font-bold text-gray-800 hindi mb-4 flex items-center gap-2">
                    <i class="fas fa-university text-orange-500"></i> बैंक विवरण (Bank Details)
                </h3>
                <div class="grid md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5 hindi">बैंक का नाम</label>
                        <input type="text" name="bank_name" placeholder="जैसे: SBI, HDFC"
                            class="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-orange-400 focus:outline-none bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5 hindi">खाता नंबर (Account Number)</label>
                        <input type="text" name="bank_account" placeholder="000000000000"
                            class="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-orange-400 focus:outline-none bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5 hindi">IFSC कोड</label>
                        <input type="text" name="ifsc" placeholder="SBIN0001234"
                            class="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-orange-400 focus:outline-none bg-gray-50 uppercase">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5 hindi">खाताधारक का नाम</label>
                        <input type="text" name="holder_name" placeholder="बैंक रिकॉर्ड के अनुसार"
                            class="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-orange-400 focus:outline-none bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">PAN Number</label>
                        <input type="text" name="pan_no" placeholder="ABCDE1234F" maxlength="10"
                            class="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-orange-400 focus:outline-none bg-gray-50 uppercase">
                    </div>
                </div>
            </div>

            <div class="bg-orange-50 border-l-4 border-orange-500 p-4 mt-4">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <i class="fas fa-info-circle text-orange-500"></i>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-orange-700 hindi">
                            <b>Login ID:</b> TCH + मोबाइल के आख़िरी 4 अंक<br>
                            <b>Default Password:</b> शिक्षक का नाम + मोबाइल नंबर
                        </p>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 pt-2">
                <button type="submit"
                    class="saffron-grad text-white px-8 py-3 rounded-xl font-bold hover:opacity-90 transition shadow-lg flex items-center gap-2">
                    <i class="fas fa-save"></i>
                    <span class="hindi">Teacher जोड़ें</span>
                </button>
                <a href="{{ url_for('manage_teachers') }}"
                    class="bg-gray-100 text-gray-600 px-8 py-3 rounded-xl font-semibold hover:bg-gray-200 transition hindi">
                    रद्द करें
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
