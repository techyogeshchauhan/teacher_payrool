{% extends "base.html" %}
{% block title %}Edit Student - गायत्री विद्यापीठ{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="{{ url_for('manage_students') }}" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-gray-500 hover:text-blue-600 hover:bg-blue-50 transition shadow-sm">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1 class="text-2xl font-bold text-gray-800 hindi">Student जानकारी अपडेट करें</h1>
    </div>

    <form method="POST" class="bg-white rounded-3xl card-shadow p-6 sm:p-8 border-t-4 border-blue-500">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="space-y-5">
            <!-- Name -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1 hindi">पूरा नाम (Full Name) <span class="text-red-500">*</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fas fa-user"></i>
                    </div>
                    <input type="text" name="name" value="{{ student.name }}" required class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-gray-800 font-medium hindi">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <!-- Class -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Class <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i class="fas fa-chalkboard"></i>
                        </div>
                        <input type="text" name="class" value="{{ student.class }}" required class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-gray-800 font-medium">
                    </div>
                </div>

                <!-- Roll No -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Roll Number <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i class="fas fa-id-badge"></i>
                        </div>
                        <input type="text" name="roll_no" value="{{ student.roll_no }}" required class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-gray-800 font-medium">
                    </div>
                </div>
            </div>

            <!-- Total Fee -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1 hindi">कुल शुल्क (Total Fee for the Year) <span class="text-red-500">*</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fas fa-rupee-sign"></i>
                    </div>
                    <input type="number" name="total_fee" value="{{ student.total_fee }}" required min="0" step="1" class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-gray-800 font-bold text-lg">
                </div>
                <p class="text-xs text-gray-500 mt-1 hindi">ध्यान दें: कुल शुल्क बदलने पर बैलेंस अपने आप अपडेट हो जाएगा।</p>
            </div>

        </div>

        <div class="mt-8">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5 hindi">
                अपडेट करें
            </button>
        </div>
    </form>
</div>

{% endblock %}
