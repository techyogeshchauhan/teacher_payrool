{% extends "base.html" %}
{% block title %}Pay Fee - गायत्री विद्यापीठ{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="{{ url_for('manage_students') }}" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-gray-500 hover:text-green-600 hover:bg-green-50 transition shadow-sm">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1 class="text-2xl font-bold text-gray-800 hindi">फीस जमा करें (Pay Fee)</h1>
    </div>

    <!-- Student Info Card -->
    <div class="bg-white rounded-2xl card-shadow p-5 border-l-4 border-green-500 mb-6 flex justify-between items-center">
        <div>
            <h2 class="text-lg font-bold text-gray-800 hindi">{{ student.name }}</h2>
            <p class="text-sm text-gray-500">Class: <span class="font-bold text-gray-700">{{ student.class }}</span> | Roll: <span class="font-bold text-gray-700">{{ student.roll_no }}</span></p>
        </div>
        <div class="text-right">
            <p class="text-xs text-gray-500 hindi">बाकी (Balance)</p>
            <p class="text-xl font-black text-red-600">₹{{ "{:,.0f}".format(student.balance_fee) }}</p>
        </div>
    </div>

    <form method="POST" class="bg-white rounded-3xl card-shadow p-6 sm:p-8">
        <div class="space-y-5">
            <!-- Amount -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1 hindi">जमा करने वाली राशि (Amount) <span class="text-red-500">*</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fas fa-rupee-sign text-lg"></i>
                    </div>
                    <input type="number" name="amount" required min="1" max="{{ student.balance_fee }}" step="1" class="w-full pl-10 pr-4 py-4 bg-green-50 border border-green-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500 focus:border-transparent transition text-gray-800 font-black text-2xl" placeholder="500">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <!-- Month -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1 hindi">किस महीने के लिए? (Month) <span class="text-red-500">*</span></label>
                    <select name="month" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500 focus:border-transparent transition text-gray-800 font-medium">
                        <option value="">-- महीना चुनें --</option>
                        <option value="April">April</option>
                        <option value="May">May</option>
                        <option value="June">June</option>
                        <option value="July">July</option>
                        <option value="August">August</option>
                        <option value="September">September</option>
                        <option value="October">October</option>
                        <option value="November">November</option>
                        <option value="December">December</option>
                        <option value="January">January</option>
                        <option value="February">February</option>
                        <option value="March">March</option>
                        <option value="Full Year">पूरे साल का (Full Year)</option>
                        <option value="Previous Dues">पिछला बकाया (Previous Dues)</option>
                    </select>
                </div>

                <!-- Remarks -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1 hindi">टिप्पणी (Remarks)</label>
                    <input type="text" name="remarks" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500 focus:border-transparent transition text-gray-800 font-medium hindi" placeholder="कोई अन्य जानकारी...">
                </div>
            </div>

        </div>

        <div class="mt-8">
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5 hindi flex items-center justify-center gap-2">
                <i class="fas fa-check-circle"></i> फीस जमा करें
            </button>
        </div>
    </form>
</div>

{% endblock %}
