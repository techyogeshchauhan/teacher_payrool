{% extends "base.html" %}
{% block title %}Change Password - गायत्री विद्यापीठ{% endblock %}
{% block content %}

<div class="max-w-xl mx-auto mt-8">
    <div class="bg-white rounded-2xl card-shadow overflow-hidden">
        <div class="green-grad px-6 py-4 flex items-center gap-3">
            <i class="fas fa-key text-white text-xl"></i>
            <h2 class="text-white font-bold text-lg hindi">पासवर्ड बदलें</h2>
        </div>

        <form method="POST" class="p-6 md:p-8 space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 hindi">पुराना पासवर्ड</label>
                <div class="relative">
                    <input type="password" name="old_password" id="old_password" required placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:outline-none bg-gray-50 text-gray-800 transition pr-12">
                    <button type="button" onclick="togglePassword('old_password', 'eye_old')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-green-500 transition">
                        <i id="eye_old" class="fas fa-eye text-lg"></i>
                    </button>
                </div>
            </div>
            
            <div class="border-t border-gray-100 my-4 pt-4"></div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 hindi">नया पासवर्ड</label>
                <div class="relative">
                    <input type="password" name="new_password" id="new_password" required placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:outline-none bg-gray-50 text-gray-800 transition pr-12">
                    <button type="button" onclick="togglePassword('new_password', 'eye_new')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-green-500 transition">
                        <i id="eye_new" class="fas fa-eye text-lg"></i>
                    </button>
                </div>
                <p class="text-xs text-gray-400 mt-1 hindi">एक मजबूत पासवर्ड का उपयोग करें</p>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 hindi">नया पासवर्ड (पुष्टि करें)</label>
                <div class="relative">
                    <input type="password" name="confirm_password" id="confirm_password" required placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:outline-none bg-gray-50 text-gray-800 transition pr-12">
                    <button type="button" onclick="togglePassword('confirm_password', 'eye_confirm')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-green-500 transition">
                        <i id="eye_confirm" class="fas fa-eye text-lg"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="w-full green-grad text-white font-bold py-3.5 rounded-xl hover:opacity-90 transition mt-6 text-lg hindi shadow-md flex items-center justify-center gap-2">
                <i class="fas fa-save"></i>
                <span class="hindi">पासवर्ड अपडेट करें</span>
            </button>
        </form>
    </div>
</div>

<script>
    function togglePassword(inputId, eyeId) {
        const passwordInput = document.getElementById(inputId);
        const eyeIcon = document.getElementById(eyeId);
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
        }
    }
</script>

{% endblock %}
